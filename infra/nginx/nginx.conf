worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ------------------------------------------------------------------
    # WebSocket precisa que o proxy repasse o header "Connection: upgrade".
    # Este map define o valor de $connection_upgrade conforme o request:
    #   - se veio "Upgrade" (handshake WebSocket)  -> "upgrade"
    #   - se nao veio nada (request HTTP normal)    -> "close"
    # ------------------------------------------------------------------
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # As 3 replicas do ChatService (resolvidas pelo DNS interno do Docker).

    # Para REST/health: round-robin (padrao). Cada request vai pra uma replica diferente
    upstream chat_rest {
        server chatservice1:8080;
        server chatservice2:8080;
        server chatservice3:8080;
    }

    # Para o Hub SignalR: ip_hash = sticky session. O mesmo cliente cai sempre
    # na mesma replica, porque o negotiate e o connect do SignalR PRECISAM
    # acertar o mesmo servidor. A entrega entre replicas diferentes fica por
    # conta do backplane Redis.
    upstream chat_hub {
        ip_hash;
        server chatservice1:8080;
        server chatservice2:8080;
        server chatservice3:8080;
    }

    server {
        listen 80;

        # Hub em tempo real (WebSocket) -> upstream sticky.
        location /hub/ {
            proxy_pass http://chat_hub;
            proxy_http_version 1.1;

            # Repassa o upgrade para o WebSocket funcionar atraves do proxy.
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Conexao WebSocket pode ficar ociosa; nao derruba antes de 1h.
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Todo o resto (REST, Swagger, /health) -> upstream round-robin.
        location / {
            proxy_pass http://chat_rest;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
